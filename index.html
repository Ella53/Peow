<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>our thread</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- ============================================================ -->
<!-- FIREBASE — replace the object below with YOUR project's config. -->
<!-- Get it from: Firebase console -> Project settings -> General ->   -->
<!-- "Your apps" -> the </> web icon -> copy the firebaseConfig object. -->

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
  :root{
    --bg:#F6F1F6;
    --bg-dot:#EADFEA;
    --ink:#2B1F35;
    --ink-soft:#6B5C74;
    --rose:#C97B84;
    --rose-soft:#F3DCDF;
    --sage:#4F8577;
    --sage-soft:#DCEAE4;
    --gold:#D9A441;
    --surface:#FFFFFF;
    --shadow:rgba(43,31,53,0.10);
    --border:rgba(43,31,53,0.10);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:
      radial-gradient(var(--bg-dot) 1px, transparent 1px) 0 0/22px 22px,
      var(--bg);
    font-family:'Nunito',sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:24px;
  }
  h1,h2,h3{font-family:'Fraunces',serif;font-weight:600;margin:0;}
  @media (prefers-reduced-motion: no-preference){
    .fade-in{animation:fadeIn .25s ease both;}
  }
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  .app{
    width:100%;
    max-width:460px;
    height:min(760px, 92vh);
    background:var(--surface);
    border-radius:22px;
    box-shadow:0 24px 60px var(--shadow), 0 2px 6px var(--shadow);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  .knot{width:46px;height:46px;display:block;margin:0 auto;}

  .panel{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:40px 32px;
    gap:16px;
    text-align:center;
    overflow-y:auto;
  }
  .brand{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:4px;}
  .brand .stitch{width:64px;height:2px;background:repeating-linear-gradient(90deg, var(--gold) 0 6px, transparent 6px 11px);border-radius:2px;}
  .brand h1{font-size:27px;letter-spacing:-0.01em;}
  .brand p{margin:0;font-size:13px;color:var(--ink-soft);}
  .field{width:100%;text-align:left;display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:12px;color:var(--ink-soft);font-weight:800;letter-spacing:.03em;text-transform:uppercase;}
  .field input{
    width:100%;padding:11px 13px;border-radius:12px;border:1.5px solid var(--border);
    background:#FBF8FB;font-family:'Nunito',sans-serif;font-size:15px;color:var(--ink);outline:none;transition:border-color .15s;
  }
  .field input:focus{border-color:var(--rose);}
  .row2{display:flex;gap:12px;width:100%;}
  .row2 > .field{flex:1;}
  button{font-family:'Nunito',sans-serif;cursor:pointer;}
  .btn-primary{
    width:100%;padding:12px;border-radius:12px;border:none;background:var(--ink);color:#fff;
    font-size:15px;font-weight:700;letter-spacing:.02em;transition:transform .1s, opacity .15s;
  }
  .btn-primary:hover{opacity:.9;}
  .btn-primary:active{transform:scale(.98);}
  .btn-primary:disabled{opacity:.5;cursor:default;}
  .linklike{background:none;border:none;color:var(--ink-soft);font-size:12.5px;text-decoration:underline;padding:2px;}
  .card-block{width:100%;border:1.5px solid var(--border);border-radius:16px;padding:18px;display:flex;flex-direction:column;gap:14px;background:#FBF8FB;}
  .card-block h3{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;font-family:'Nunito',sans-serif;font-weight:800;}
  .who-btn{
    width:100%;display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;border:1.5px solid var(--border);
    background:#fff;text-align:left;font-size:15px;font-weight:700;color:var(--ink);transition:border-color .15s, background .15s;
  }
  .who-btn:hover{border-color:var(--rose);}
  .who-btn.selected{border-color:var(--rose);background:var(--rose-soft);}
  .avatar{
    width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'Fraunces',serif;font-weight:600;font-size:14px;color:#fff;flex-shrink:0;
  }
  .avatar.a{background:var(--rose);}
  .avatar.b{background:var(--sage);}
  .error-msg{font-size:13px;color:#A3403C;background:#FBEAE9;padding:8px 12px;border-radius:10px;width:100%;}
  .hint{font-size:12px;color:var(--ink-soft);line-height:1.5;}

  .chat-header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .chat-header .who{display:flex;align-items:center;gap:10px;}
  .chat-header .names{display:flex;flex-direction:column;line-height:1.2;}
  .chat-header .names b{font-family:'Fraunces',serif;font-size:15px;font-weight:600;}
  .chat-header .names span{font-size:11px;color:var(--ink-soft);display:flex;align-items:center;gap:5px;}
  .dot-live{width:6px;height:6px;border-radius:50%;background:var(--sage);flex-shrink:0;}
  .logout-btn{border:none;background:none;color:var(--ink-soft);font-size:12px;padding:6px 8px;border-radius:8px;}
  .logout-btn:hover{background:var(--bg);color:var(--ink);}
  .stitch-divider{height:1px;margin:0 18px;background:repeating-linear-gradient(90deg, var(--gold) 0 6px, transparent 6px 11px);opacity:.55;flex-shrink:0;}
  .messages{flex:1;overflow-y:auto;padding:16px 16px 6px;display:flex;flex-direction:column;gap:4px;}
  .empty-state{margin:auto;text-align:center;color:var(--ink-soft);font-size:13.5px;padding:20px;line-height:1.6;}
  .empty-state svg{margin-bottom:10px;}
  .msg-row{display:flex;gap:8px;margin:6px 0;max-width:100%;}
  .msg-row.mine{flex-direction:row-reverse;}
  .msg-row .bubble-wrap{display:flex;flex-direction:column;max-width:74%;}
  .msg-row.mine .bubble-wrap{align-items:flex-end;}
  .msg-row:not(.mine) .bubble-wrap{align-items:flex-start;}
  .bubble{padding:9px 13px;border-radius:16px;font-size:14.5px;line-height:1.45;word-wrap:break-word;white-space:pre-wrap;}
  .msg-row.mine .bubble{background:var(--rose-soft);color:var(--ink);border-bottom-right-radius:4px;}
  .msg-row:not(.mine) .bubble{background:var(--sage-soft);color:var(--ink);border-bottom-left-radius:4px;}
  .bubble img{display:block;max-width:220px;max-height:260px;border-radius:10px;margin-top:2px;cursor:pointer;border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.15);}
  .bubble .cap{margin-bottom:6px;}
  .msg-time{font-size:10.5px;color:var(--ink-soft);margin-top:3px;padding:0 4px;}
  .day-sep{text-align:center;font-size:11px;color:var(--ink-soft);margin:14px 0 6px;letter-spacing:.03em;text-transform:uppercase;}
  .composer{display:flex;align-items:flex-end;gap:8px;padding:12px 14px;border-top:1px solid var(--border);flex-shrink:0;background:#fff;}
  .composer textarea{
    flex:1;resize:none;border:1.5px solid var(--border);border-radius:16px;padding:10px 14px;
    font-family:'Nunito',sans-serif;font-size:14.5px;max-height:90px;outline:none;line-height:1.4;
  }
  .composer textarea:focus{border-color:var(--rose);}
  .icon-btn{
    width:38px;height:38px;border-radius:50%;border:1.5px solid var(--border);background:#fff;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:17px;color:var(--ink-soft);transition:background .15s, color .15s;
  }
  .icon-btn:hover{background:var(--bg);}
  .send-btn{background:var(--ink);color:#fff;border-color:var(--ink);}
  .send-btn:hover{opacity:.9;background:var(--ink);}
  .send-btn:disabled{opacity:.4;}
  .preview-strip{padding:0 14px 8px;display:none;align-items:center;gap:8px;}
  .preview-strip.show{display:flex;}
  .preview-strip img{width:48px;height:48px;object-fit:cover;border-radius:8px;border:2px solid var(--rose-soft);}
  .preview-strip .rm{border:none;background:none;color:var(--ink-soft);font-size:12px;text-decoration:underline;}
  .lightbox{position:absolute;inset:0;background:rgba(20,14,24,.9);display:none;align-items:center;justify-content:center;z-index:20;padding:24px;}
  .lightbox.show{display:flex;}
  .lightbox img{max-width:100%;max-height:100%;border-radius:10px;}
  .lightbox-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.15);color:#fff;border:none;width:32px;height:32px;border-radius:50%;font-size:16px;}
  .loading-screen{flex:1;display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:center;color:var(--ink-soft);font-size:14px;}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
</style>
</head>
<body>

<div class="app" id="app">
  <div class="loading-screen" id="loading">
    <svg class="knot" viewBox="0 0 46 46" fill="none"><circle cx="23" cy="23" r="21" stroke="#C97B84" stroke-width="1.4" stroke-dasharray="2 5"/><circle cx="17" cy="23" r="8" stroke="#4F8577" stroke-width="1.6"/><circle cx="29" cy="23" r="8" stroke="#C97B84" stroke-width="1.6"/></svg>
    opening the thread…
  </div>
</div>

<script>
/* ============================================================ */
/* 1. PASTE YOUR FIREBASE CONFIG HERE                            */
/* ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyDRNhEakeyDdmNAWIxILO6QBWWvHCzJcj8",
  authDomain: "peow-9c9ee.firebaseapp.com",
  projectId: "peow-9c9ee",
  storageBucket: "peow-9c9ee.firebasestorage.app",
  messagingSenderId: "304725127042",
  appId: "1:304725127042:web:7b88c5a8964d7bc6fce99b"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

(function(){
  const app = document.getElementById('app');
  let accounts = null;
  let currentUser = null;
  let messages = [];
  let pendingImage = null;
  let unsubscribe = null;

  async function sha256(text){
    const enc = new TextEncoder().encode(text);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  function escapeHtml(s){
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }
  function fmtTime(ts){
    return new Date(ts).toLocaleTimeString([], {hour:'numeric', minute:'2-digit'});
  }
  function fmtDay(ts){
    const d = new Date(ts);
    const today = new Date();
    const y = new Date(); y.setDate(today.getDate()-1);
    if(d.toDateString()===today.toDateString()) return 'Today';
    if(d.toDateString()===y.toDateString()) return 'Yesterday';
    return d.toLocaleDateString([], {month:'short', day:'numeric', year: d.getFullYear()!==today.getFullYear()?'numeric':undefined});
  }

  async function init(){
    try{
      const doc = await db.collection('meta').doc('accounts').get();
      accounts = doc.exists ? doc.data() : null;
    }catch(e){
      renderConnectionError(e);
      return;
    }
    if(accounts && accounts.p1 && accounts.p2){
      renderLogin();
    }else{
      renderSetup();
    }
  }

  function renderConnectionError(e){
    app.innerHTML = `
      <div class="panel">
        <div class="brand"><h1>can't connect</h1></div>
        <div class="error-msg" style="text-align:left;">
          Couldn't reach the database. If you just set this up, double-check the
          firebaseConfig values at the top of the file, and that Firestore is
          enabled in your Firebase project.
        </div>
        <p class="hint">${escapeHtml(String(e && e.message || e))}</p>
      </div>`;
  }

  function renderSetup(){
    app.innerHTML = `
      <div class="panel fade-in">
        <svg class="knot" viewBox="0 0 46 46" fill="none"><circle cx="17" cy="23" r="9" stroke="#4F8577" stroke-width="1.8"/><circle cx="29" cy="23" r="9" stroke="#C97B84" stroke-width="1.8"/></svg>
        <div class="brand">
          <h1>our thread</h1>
          <div class="stitch"></div>
          <p>a little private space, just for the two of you</p>
        </div>
        <div class="card-block">
          <h3>Set up your accounts</h3>
          <div class="row2">
            <div class="field"><label>Your name</label><input id="p1name" placeholder="e.g. Mehe" maxlength="20"/></div>
            <div class="field"><label>Bestie's name</label><input id="p2name" placeholder="e.g. Ria" maxlength="20"/></div>
          </div>
          <div class="row2">
            <div class="field"><label>Your password</label><input id="p1pass" type="password" placeholder="min 4 characters"/></div>
            <div class="field"><label>Bestie's password</label><input id="p2pass" type="password" placeholder="min 4 characters"/></div>
          </div>
        </div>
        <div id="setupError"></div>
        <button class="btn-primary" id="setupBtn">Create our thread</button>
        <p class="hint">Each of you picks your own password. This only has to be done once — ever.</p>
      </div>
    `;
    document.getElementById('setupBtn').onclick = doSetup;
  }

  async function doSetup(){
    const p1name = document.getElementById('p1name').value.trim();
    const p2name = document.getElementById('p2name').value.trim();
    const p1pass = document.getElementById('p1pass').value;
    const p2pass = document.getElementById('p2pass').value;
    const errEl = document.getElementById('setupError');
    errEl.innerHTML = '';
    if(!p1name || !p2name){ errEl.innerHTML = '<div class="error-msg">Add a name for both of you.</div>'; return; }
    if(p1pass.length < 4 || p2pass.length < 4){ errEl.innerHTML = '<div class="error-msg">Passwords need at least 4 characters.</div>'; return; }
    const btn = document.getElementById('setupBtn');
    btn.disabled = true; btn.textContent = 'Setting up…';
    const p1hash = await sha256(p1pass);
    const p2hash = await sha256(p2pass);
    accounts = { p1:{name:p1name, hash:p1hash}, p2:{name:p2name, hash:p2hash} };
    try{
      await db.collection('meta').doc('accounts').set(accounts);
      renderLogin();
    }catch(e){
      errEl.innerHTML = '<div class="error-msg">Could not save — check your Firebase setup and try again.</div>';
      btn.disabled = false; btn.textContent = 'Create our thread';
    }
  }

  let selectedSlot = null;
  function renderLogin(){
    selectedSlot = null;
    app.innerHTML = `
      <div class="panel fade-in">
        <svg class="knot" viewBox="0 0 46 46" fill="none"><circle cx="17" cy="23" r="9" stroke="#4F8577" stroke-width="1.8"/><circle cx="29" cy="23" r="9" stroke="#C97B84" stroke-width="1.8"/></svg>
        <div class="brand"><h1>our thread</h1><div class="stitch"></div><p>who's opening it?</p></div>
        <div class="card-block" style="gap:10px;">
          <button class="who-btn" data-slot="p1" id="btn-p1">
            <div class="avatar a">${escapeHtml((accounts.p1.name[0]||'?')).toUpperCase()}</div>
            <span>${escapeHtml(accounts.p1.name)}</span>
          </button>
          <button class="who-btn" data-slot="p2" id="btn-p2">
            <div class="avatar b">${escapeHtml((accounts.p2.name[0]||'?')).toUpperCase()}</div>
            <span>${escapeHtml(accounts.p2.name)}</span>
          </button>
        </div>
        <div class="field"><label>Password</label><input id="loginPass" type="password" placeholder="Enter your password"/></div>
        <div id="loginError"></div>
        <button class="btn-primary" id="loginBtn" disabled>Open thread</button>
        <button class="linklike" id="resetLink">Start over / forgot setup</button>
      </div>
    `;
    document.getElementById('btn-p1').onclick = ()=>selectSlot('p1');
    document.getElementById('btn-p2').onclick = ()=>selectSlot('p2');
    document.getElementById('loginBtn').onclick = doLogin;
    document.getElementById('resetLink').onclick = confirmReset;
    document.getElementById('loginPass').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });
  }

  function selectSlot(slot){
    selectedSlot = slot;
    document.getElementById('btn-p1').classList.toggle('selected', slot==='p1');
    document.getElementById('btn-p2').classList.toggle('selected', slot==='p2');
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginPass').focus();
  }

  async function doLogin(){
    const errEl = document.getElementById('loginError');
    errEl.innerHTML = '';
    if(!selectedSlot){ errEl.innerHTML = '<div class="error-msg">Pick who you are first.</div>'; return; }
    const pass = document.getElementById('loginPass').value;
    const btn = document.getElementById('loginBtn');
    btn.disabled = true; btn.textContent = 'Checking…';
    const hash = await sha256(pass);
    if(hash === accounts[selectedSlot].hash){
      currentUser = {slot:selectedSlot, name:accounts[selectedSlot].name};
      renderChat();
    }else{
      errEl.innerHTML = '<div class="error-msg">That password doesn\\'t match.</div>';
      btn.disabled = false; btn.textContent = 'Open thread';
    }
  }

  function confirmReset(){
    app.querySelector('.panel').insertAdjacentHTML('beforeend',
      `<div class="error-msg" id="resetConfirm">This deletes both accounts (not your messages). <button class="linklike" style="color:#A3403C" id="doResetYes">Yes, reset accounts</button></div>`
    );
    document.getElementById('resetLink').style.display='none';
    document.getElementById('doResetYes').onclick = async ()=>{
      try{ await db.collection('meta').doc('accounts').delete(); }catch(e){}
      accounts = null;
      renderSetup();
    };
  }

  function renderChat(){
    const other = currentUser.slot === 'p1' ? accounts.p2 : accounts.p1;
    app.innerHTML = `
      <div class="chat-header">
        <div class="who">
          <div class="avatar ${currentUser.slot==='p1'?'a':'b'}">${escapeHtml((currentUser.name[0]||'?')).toUpperCase()}</div>
          <div class="names">
            <b>${escapeHtml(other.name)}</b>
            <span><span class="dot-live"></span>chatting as ${escapeHtml(currentUser.name)}</span>
          </div>
        </div>
        <button class="logout-btn" id="logoutBtn">Switch account</button>
      </div>
      <div class="stitch-divider"></div>
      <div class="messages" id="messages"><div class="empty-state">loading your messages…</div></div>
      <div class="preview-strip" id="previewStrip">
        <img id="previewImg" src=""/>
        <span style="font-size:12px;color:var(--ink-soft);flex:1;">photo attached</span>
        <button class="rm" id="removePreview">remove</button>
      </div>
      <div class="composer">
        <button class="icon-btn" id="photoBtn" title="Add a photo">📷</button>
        <input type="file" id="fileInput" accept="image/*" style="display:none;"/>
        <textarea id="msgInput" placeholder="Write something…" rows="1"></textarea>
        <button class="icon-btn send-btn" id="sendBtn" title="Send">➤</button>
      </div>
      <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightboxClose">✕</button>
        <img id="lightboxImg" src=""/>
      </div>
    `;
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('photoBtn').onclick = ()=>document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = handleFile;
    document.getElementById('removePreview').onclick = clearPreview;
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('lightboxClose').onclick = ()=>document.getElementById('lightbox').classList.remove('show');
    document.getElementById('lightbox').onclick = (e)=>{ if(e.target.id==='lightbox') e.currentTarget.classList.remove('show'); };
    const input = document.getElementById('msgInput');
    input.addEventListener('input', ()=>{ input.style.height='auto'; input.style.height = Math.min(input.scrollHeight,90)+'px'; });
    input.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendMessage(); } });

    if(unsubscribe) unsubscribe();
    unsubscribe = db.collection('messages').orderBy('ts', 'asc').onSnapshot(
      snap=>{
        messages = snap.docs.map(d=>d.data());
        renderMessages();
      },
      err=>{
        const el = document.getElementById('messages');
        if(el) el.innerHTML = '<div class="empty-state">Trouble loading messages. Check your connection.</div>';
      }
    );
  }

  function logout(){
    if(unsubscribe) unsubscribe();
    currentUser = null;
    pendingImage = null;
    renderLogin();
  }

  function renderMessages(){
    const el = document.getElementById('messages');
    if(!el) return;
    const wasNearBottom = el.scrollHeight - el.scrollTop - el.clientHeight < 120;
    if(messages.length===0){
      el.innerHTML = `<div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 46 46" fill="none"><circle cx="17" cy="23" r="9" stroke="#4F8577" stroke-width="1.8"/><circle cx="29" cy="23" r="9" stroke="#C97B84" stroke-width="1.8"/></svg>
        This is the start of your thread.<br>Say hi 👋
      </div>`;
      return;
    }
    let html = '';
    let lastDay = '';
    messages.forEach(m=>{
      const day = fmtDay(m.ts);
      if(day !== lastDay){ html += `<div class="day-sep">${escapeHtml(day)}</div>`; lastDay = day; }
      const mine = m.sender === currentUser.name;
      html += `<div class="msg-row ${mine?'mine':''}">
        <div class="bubble-wrap">
          <div class="bubble">
            ${m.image ? `<img src="${m.image}" class="msg-img" data-full="${m.image}"/>` : ''}
            ${m.text ? `<div class="${m.image?'cap':''}">${escapeHtml(m.text)}</div>` : ''}
          </div>
          <div class="msg-time">${fmtTime(m.ts)}</div>
        </div>
      </div>`;
    });
    el.innerHTML = html;
    el.querySelectorAll('.msg-img').forEach(img=>{
      img.onclick = ()=>{ document.getElementById('lightboxImg').src = img.dataset.full; document.getElementById('lightbox').classList.add('show'); };
    });
    if(wasNearBottom || el.scrollTop === 0){ el.scrollTop = el.scrollHeight; }
  }

  function handleFile(e){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = function(ev){
      const img = new Image();
      img.onload = function(){
        const maxDim = 700;
        let w = img.width, h = img.height;
        if(w > maxDim || h > maxDim){
          if(w > h){ h = Math.round(h * maxDim / w); w = maxDim; } else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        pendingImage = canvas.toDataURL('image/jpeg', 0.65);
        document.getElementById('previewImg').src = pendingImage;
        document.getElementById('previewStrip').classList.add('show');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  }

  function clearPreview(){ pendingImage = null; document.getElementById('previewStrip').classList.remove('show'); }

  async function sendMessage(){
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if(!text && !pendingImage) return;
    const sendBtn = document.getElementById('sendBtn');
    sendBtn.disabled = true;
    const newMsg = { sender: currentUser.name, text: text, image: pendingImage, ts: Date.now() };
    try{
      await db.collection('messages').add(newMsg);
      input.value=''; input.style.height='auto';
      clearPreview();
    }catch(e){
      alert('Could not send — the photo might be too large, or check your connection.');
    }
    sendBtn.disabled = false;
  }

  init();
})();
</script>
</body>
</html>
